name: Build and release installer

on:
  release:
    types: [published]

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - rid: linux-x64
            asset: authvault-linux-x64
          - rid: linux-arm64
            asset: authvault-linux-arm64
          - rid: win-x64
            asset: authvault-win-x64.exe
          - rid: osx-x64
            asset: authvault-macos-x64
          - rid: osx-arm64
            asset: authvault-macos-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish installer
        run: |
          dotnet publish AuthVault.Installer/AuthVault.Installer.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:DebugType=none \
            -o ./dist/${{ matrix.rid }}

      - name: Rename binary
        run: |
          if [ "${{ matrix.rid }}" = "win-x64" ]; then
            cp "./dist/${{ matrix.rid }}/authvault.exe" "./${{ matrix.asset }}"
          else
            cp "./dist/${{ matrix.rid }}/authvault" "./${{ matrix.asset }}"
          fi

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} ./${{ matrix.asset }}
