# Development compose file.
# Production docker-compose.yml is generated by the installer in ~/.authvault/

services:
  authvault-app:
    build:
      context: ./PasswordManager
    container_name: authvault-app
    env_file: .env
    volumes:
      - ./PasswordManager/certs:/app/certs:ro
    ports:
      - "${HTTPS_PORT:-7108}:${HTTPS_PORT:-7108}"
      - "${HTTP_PORT:-5168}:${HTTP_PORT:-5168}"
    depends_on:
      authvault-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - authvault-net

  authvault-db:
    image: ${MSSQL_IMAGE:-mcr.microsoft.com/mssql/server:2022-latest}
    container_name: authvault-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - authvault-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -No 2>/dev/null || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -No"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped
    networks:
      - authvault-net

volumes:
  authvault-data:

networks:
  authvault-net:
    driver: bridge
